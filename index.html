<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C Content Schedule Planner</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" href="public/favicon.png">
    <!-- Hard cache bust — forces fresh asset load once per browser session -->
    <script>
        (function() {
            var key = '3c_cache_busted';
            if (!sessionStorage.getItem(key)) {
                sessionStorage.setItem(key, '1');
                var url = new URL(window.location.href);
                url.searchParams.set('_v', Date.now());
                window.location.replace(url.toString());
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Upgraded from 6.1.10 → 6.1.19 (latest stable, no breaking changes) -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <link rel="stylesheet" href="css/styles.css?v=1.1.6">
    <link rel="stylesheet" href="css/navigation.css?v=1.0.5">
    <link rel="stylesheet" href="css/nav-toggle.css?v=1.0.7">
    <!-- Card 1/2/3 read-only popup styling — written fresh, not a clone. Scoped, doesn't touch anything above -->
    <link rel="stylesheet" href="css/record-card.css?v=2.1.4">

    <!-- Supabase Configuration - Load from config.js -->
    <script src="config.js"></script>
</head>
<body>
    <div style="width:100%; text-align:right; padding: 3px 16px; font-size: 0.65rem; opacity: 0.5; letter-spacing: 0.02em; color: inherit; pointer-events: none;">
        Designed and Built with ❤️ by Claude (Anthropic) × Chef Anica · 3C Thread To Success™ Cooking Lab 🧪👨‍🍳
    </div>
    <header class="header">
        <div class="logo-section">
            <img src="public/logo.png" alt="3C Logo" class="logo">
            <h1 class="title">3C Content Schedule Planner</h1>
        </div>
        <div class="header-buttons">
            <a href="https://anica-blip.github.io/3c-content-record-centre/" target="_blank" rel="noopener noreferrer" class="btn btn-icon-svg" title="Open 3C Content Record Centre">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 9v4l3 2"/><path d="M19.4 7.5a9 9 0 1 1-2-3" stroke-dasharray="1 3"/></svg>
            </a>
            <button class="btn btn-icon-svg" onclick="window.location.href='links-manager.html'" title="Manage Navigation Links">
                <svg viewBox="0 0 24 24"><path d="M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9"/><path d="M12 7l3 5-3 5-3-5Z"/></svg>
            </button>
            <button id="signout-btn" class="btn btn-icon-svg" onclick="signOut()" title="Sign Out">
                <svg viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4M15 16l5-5-5-5M20 11H9"/></svg>
            </button>
        </div>
    </header>

    <!-- Navigation Panel -->
    <div id="nav-panel">
        <div class="nav-content">
            <a href="#" class="nav-icon" title="Memos">
                📮
            </a>
            <a href="#" class="nav-icon" title="Voice Memo">
                🎤
            </a>
            <a href="#" class="nav-icon" title="Chatroom">
                👥
            </a>
            <a href="#" class="nav-icon" title="AI Assistant">
                💡
            </a>
            <a href="#" class="nav-icon" title="Supabase">
                💺
            </a>
            <a href="#" class="nav-icon" title="Railway">
                🔋
            </a>
            <a href="#" class="nav-icon" title="Password Manager">
                🔏
            </a>
            <a href="#" class="nav-icon mobile-view" title="Mobile View">
                📱
            </a>
            <a href="/" class="nav-icon" title="Back to Dashboard">
                🔙
            </a>
        </div>
    </div>

    <!-- Navigation Toggle Container near Calendar -->
    <div id="nav-toggle-container">
        <button id="nav-toggle-btn" onclick="toggleNavPanel()" title="Navigation Menu">
            💎
        </button>
    </div>

    <div class="container">
        <div class="calendar-container">
            <div id="calendar"></div>
        </div>
    </div>

    <!-- Old manual-post "Create New Post" modal removed along with its
         app.js functions (openCreatePostModal, handlePostSubmit, etc.) —
         it was conflicting with the Record Centre card system and is due
         for a proper rebuild later, matching the container style, per
         SETUP.md "old schedule". -->


    <script src="js/auth.js?v=1.0.0"></script>
    <script src="js/supabaseAPI.js?v=1.1.3"></script>
    <script src="js/app.js?v=1.3.7"></script>
    <script src="js/navigation.js?v=1.0.3"></script>
    <!-- Card 1/2/3 read-only popup — plain script, no imports needed, self-contained -->
    <script src="js/record-popup.js?v=2.0.1"></script>
    <script>
        // ── Sign out — wired to 🚪 button in header ────────────────────────────
        // Clears the Record Centre token now, not the Supabase session.
        function signOut() {
            logoutRecordCentre();
        }
    </script>
</body>
</html>
